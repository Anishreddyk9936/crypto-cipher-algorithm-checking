<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔐 Crypto Toolkit</title>

<style>
body {
    background: linear-gradient(135deg,#141e30,#243b55);
    font-family: Arial;
    color: white;
    text-align: center;
}

h1 { margin-top:20px; }

.tabs button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00c6ff;
}

.card { display:none; padding:20px; }
.card.active { display:block; }

input, textarea, select {
    width:80%;
    margin:10px;
    padding:10px;
    border-radius:8px;
    border:none;
}

button.action {
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    cursor:pointer;
}

.result {
    background:#eee;
    color:black;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    white-space:pre-line;
}

.step {
    background:#fafafa;
    color:black;
    padding:6px;
    margin-top:5px;
    border-radius:5px;
}
</style>
</head>

<body>

<h1>🔐 Crypto Toolkit</h1>

<div class="tabs">
    <button onclick="showTab(0)">Caesar</button>
    <button onclick="showTab(1)">Rail Fence</button>
    <button onclick="showTab(2)">RSA</button>
</div>

<!-- CAESAR -->
<div class="card active">
    <h2>Caesar Cipher</h2>
    <input id="cText" placeholder="Enter text">
    <input id="cKey" type="number" placeholder="Shift key">
    <br>
    <button class="action" onclick="caesarEncrypt()">Encrypt</button>
    <button class="action" onclick="caesarDecrypt()">Decrypt</button>
    <div class="result" id="cResult"></div>
</div>

<!-- RAIL FENCE -->
<div class="card">
    <h2>Rail Fence Cipher</h2>
    <input id="rfKey" type="number" placeholder="Rails">
    <textarea id="rfText"></textarea>
    <br>
    <button class="action" onclick="railFenceEncrypt()">Encrypt</button>
    <button class="action" onclick="railFenceDecrypt()">Decrypt</button>
    <div class="result" id="rfResult"></div>
</div>

<!-- RSA (REFERENCE STYLE) -->
<div class="card">

<h2>RSA Cryptography</h2>

<h3>Step 1 : Enter Prime Numbers</h3>
<input id="p" placeholder="Enter prime p">
<input id="q" placeholder="Enter prime q">
<button class="action" onclick="calculate()">Calculate n and φ(n)</button>
<div class="result" id="values"></div>

<h3>Step 2 : Choose Public Key e</h3>
<select id="e"></select>
<button class="action" onclick="generateKeys()">Generate Keys</button>
<div class="result" id="keys"></div>

<h3>Step 3 : Encryption / Decryption</h3>

<select id="datatype">
<option value="number">Number</option>
<option value="text">Text</option>
</select>

<input id="message" placeholder="Enter message">

<button class="action" onclick="encrypt()">Encrypt</button>
<button class="action" onclick="decrypt()">Decrypt</button>

<div class="result" id="cipher"></div>
<div class="result" id="plain"></div>

<h3>Algorithm Steps</h3>
<div id="steps"></div>

</div>

<script>

// TAB
function showTab(i){
    let cards=document.querySelectorAll(".card");
    cards.forEach(c=>c.classList.remove("active"));
    cards[i].classList.add("active");
}

// CAESAR
function caesarEncrypt(){ processCaesar(1); }
function caesarDecrypt(){ processCaesar(-1); }

function processCaesar(dir){
    let text=cText.value;
    let key=parseInt(cKey.value)||0;
    let res="";

    for(let ch of text){
        if(/[a-zA-Z]/.test(ch)){
            let base = ch===ch.toLowerCase()?97:65;
            res+=String.fromCharCode((ch.charCodeAt(0)-base+dir*key+26)%26+base);
        } else res+=ch;
    }
    cResult.innerText=res;
}

// RAIL FENCE
function railFenceEncrypt(){
    let text=rfText.value;
    let key=parseInt(rfKey.value);

    if(key<=1){ rfResult.innerText=text; return; }

    let rails=Array.from({length:key},()=> "");
    let row=0,dir=1;

    for(let ch of text){
        rails[row]+=ch;
        if(row===0) dir=1;
        else if(row===key-1) dir=-1;
        row+=dir;
    }
    rfResult.innerText=rails.join("");
}

function railFenceDecrypt(){
    let text=rfText.value;
    let key=parseInt(rfKey.value);

    if(key<=1){ rfResult.innerText=text; return; }

    let len=text.length, pattern=[], row=0, dir=1;

    for(let i=0;i<len;i++){
        pattern.push(row);
        if(row===0) dir=1;
        else if(row===key-1) dir=-1;
        row+=dir;
    }

    let count=Array(key).fill(0);
    pattern.forEach(r=>count[r]++);

    let rails=[], idx=0;
    for(let i=0;i<key;i++){
        rails[i]=text.slice(idx,idx+count[i]).split("");
        idx+=count[i];
    }

    let result="", railIndex=Array(key).fill(0);
    for(let r of pattern){
        result+=rails[r][railIndex[r]++];
    }

    rfResult.innerText=result;
}

// ================= RSA (REFERENCE EXACT) =================

let p,q,n,phi,e,d;
let cipherArray=[], cipherNumber;

function isPrime(num){
    if(num<=1) return false;
    for(let i=2;i<=Math.sqrt(num);i++){
        if(num%i==0) return false;
    }
    return true;
}

function gcd(a,b){
    while(b!=0){
        let t=b;
        b=a%b;
        a=t;
    }
    return a;
}

function modInverse(e,phi){
    for(let i=1;i<phi;i++){
        if((e*i)%phi==1) return i;
    }
    return null;
}

function modPow(base,exp,mod){
    let result=1;
    base%=mod;
    while(exp>0){
        if(exp%2==1) result=(result*base)%mod;
        base=(base*base)%mod;
        exp=Math.floor(exp/2);
    }
    return result;
}

function calculate(){
    p=parseInt(document.getElementById("p").value);
    q=parseInt(document.getElementById("q").value);

    if(!isPrime(p)||!isPrime(q)){
        alert("Enter valid PRIME numbers");
        return;
    }

    if(p==q){
        alert("p and q must be different");
        return;
    }

    n=p*q;
    phi=(p-1)*(q-1);

    values.innerText="n="+n+"\nφ(n)="+phi;

    let select=document.getElementById("e");
    select.innerHTML="";

    for(let i=2;i<phi;i++){
        if(gcd(i,phi)==1){
            let opt=document.createElement("option");
            opt.value=i;
            opt.text=i;
            select.appendChild(opt);
        }
    }
}

function generateKeys(){
    e=parseInt(document.getElementById("e").value);
    d=modInverse(e,phi);

    keys.innerText=
    "Public Key {"+e+","+n+"}\nPrivate Key {"+d+","+n+"}";

    steps.innerHTML=
    "<div class='step'>p="+p+", q="+q+"</div>"+
    "<div class='step'>n="+n+"</div>"+
    "<div class='step'>φ="+phi+"</div>"+
    "<div class='step'>e="+e+"</div>"+
    "<div class='step'>d="+d+"</div>";
}

function encrypt(){
    let type=datatype.value;
    let msg=message.value;

    if(type==="number"){
        let m=parseInt(msg);
        if(m>=n){ alert("m < n required"); return; }

        cipherNumber=modPow(m,e,n);
        cipher.innerText="C="+cipherNumber;
    }
    else{
        cipherArray=[];
        let res="";
        for(let ch of msg){
            let c=modPow(ch.charCodeAt(0),e,n);
            cipherArray.push(c);
            res+=c+" ";
        }
        cipher.innerText=res;
    }
}

function decrypt(){
    let type=datatype.value;

    if(type==="number"){
        plain.innerText="M="+modPow(cipherNumber,d,n);
    }
    else{
        let res="";
        for(let c of cipherArray){
            res+=String.fromCharCode(modPow(c,d,n));
        }
        plain.innerText=res;
    }
}

</script>

</body>
</html>
